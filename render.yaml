services:
  - type: web
    name: bloodlink
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn app:application --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com localhost 127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: bloodlink-db
          property: connectionString
      - key: AT_USERNAME
        value: sandbox
      - key: AT_API_KEY
        value: atsk_d7bad867730125e077fcf34902a3e45107e87d8cfd5b8336c1642fc34bccd4b0a4ed14bf
      - key: AT_SENDER_ID
        value: BloodLink

databases:
  - name: bloodlink-db
    databaseName: bloodlink_db
    user: bloodlink_user
